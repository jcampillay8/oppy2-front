name: oppy2_frontend
description: "Frontend para práctica de inglés con IA - Enfoque Autenticación"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # --- UI & Icons ---
  cupertino_icons: ^1.0.8
  font_awesome_flutter: ^10.7.0

  # --- Autenticación & Seguridad ---
  google_sign_in: ^6.2.1
  flutter_secure_storage: ^9.0.0
  app_links: ^7.0.0

  # --- Comunicación & Networking ---
  dio: ^5.4.1
  path_provider: ^2.1.2        # Actualizado a la última estable
  permission_handler: ^11.3.0  # ¡IMPORTANTE para el micrófono!

  # --- Gestión de Estado ---
  flutter_riverpod: ^2.5.1
  provider: ^6.1.2             # Versión estable para tu MultiProvider

  # --- Multimedia ---
  record: 5.1.0 
  record_platform_interface: 1.1.0               # ¡CRÍTICO para grabar el Speaking!
  audioplayers: ^5.2.1
  
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0           # Versión más estable para SDK 3.x

flutter:
  uses-material-design: true

  assets:
    - assets/images/